<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReduziX - Central de Compliance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #EB4E4E;
            --bg: #0B1220;
            --surface: #151C2C;
            --text: #F3F4F6;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        img { max-width: 200px; margin-bottom: 20px; }
        a {
            display: block;
            color: var(--primary);
            text-decoration: none;
            margin: 10px 0;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="assets/LOGO-REDUZIX.png" alt="Logo">
        <h2>Documentação Legal</h2>
        <a href="politica.html">Política de Privacidade</a>
        <a href="suporte.html">Suporte Técnico</a>
    </div>

</html>
